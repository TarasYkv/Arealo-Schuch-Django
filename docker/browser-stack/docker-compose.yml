# Backloom Browser-Stack — laeuft auf dem Hetzner-Workloom-Host.
#
# Dieser Compose-Stack haelt einen Always-On-Container, der ueber die
# Control-API on demand Chromium startet/stoppt. Eine Session zur Zeit.
# Wer parallel will, klont diesen Service mit anderem Namen + Ports.

services:
  backloom-browser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backloom-browser
    image: backloom-browser:latest
    restart: unless-stopped
    shm_size: 1gb
    init: true
    environment:
      SCREEN_RESOLUTION: "1280x800x24"
      TZ: "Europe/Berlin"
    ports:
      - "127.0.0.1:6080:6080"   # noVNC WebSocket — gehört nur durch nginx-proxy raus
      - "127.0.0.1:8888:8888"   # Control-API — nur fuer Workloom-Worker auf demselben Host
      - "127.0.0.1:9222:9222"   # Chrome DevTools — nur intern fuer browser-use
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
