# Backloom Browser-Stack — laeuft auf dem Hetzner-Workloom-Host.
#
# Dieser Compose-Stack haelt einen Always-On-Container, der ueber die
# Control-API on demand Chromium startet/stoppt. Eine Session zur Zeit.
# Wer parallel will, klont diesen Service mit anderem Namen + Ports.

services:
  backloom-browser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backloom-browser
    image: backloom-browser:latest
    restart: unless-stopped
    shm_size: 1gb
    init: true
    # network_mode: host damit Chromium auf 127.0.0.1:9222 (im Container)
    # gleichzeitig vom Host-Worker erreichbar ist. Chrome >=111 ignoriert
    # --remote-debugging-address=0.0.0.0 aus Sicherheitsgruenden und bindet
    # nur an 127.0.0.1 — das wuerde mit Standard-Bridge-Network blockieren.
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
