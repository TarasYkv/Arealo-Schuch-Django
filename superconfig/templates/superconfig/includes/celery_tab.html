<!-- Celery Monitor Tab -->
<div class="tab-pane fade" id="celery-main-pane" role="tabpanel">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">
                <i class="fas fa-tasks me-2"></i>
                Celery Task Monitor (Flower)
            </h5>
        </div>
        <div class="card-body p-0">
            <div class="ratio ratio-16x9" style="min-height: 700px;">
                <iframe 
                    src="/flower/" 
                    title="Flower Celery Monitor"
                    style="border: none; width: 100%; height: 100%;"
                    loading="lazy">
                </iframe>
            </div>
        </div>
    </div>
    
    <div class="card mt-3">
        <div class="card-header">
            <h6 class="mb-0">
                <i class="fas fa-info-circle me-2"></i>

            </h6>
        </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="alert alert-success">
                        <strong>Workers:</strong> 10 konfiguriert
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="alert alert-info">
                        <strong>Broker:</strong> Redis (localhost:6379)
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="alert alert-secondary">
                        <strong>Apps:</strong> BlogPrep, Mail, LoomLine, MyCut
                    </div>
                </div>
            </div>

                Der Celery Monitor zeigt alle laufenden Background-Tasks. 
                Lange API-Calls (Bild-Generierung, Research, etc.) werden hier verarbeitet.
            </p>
