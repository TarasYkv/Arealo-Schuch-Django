{% extends 'base.html' %}

{% block title %}Forschungsassistent{% endblock %}

{% block extra_css %}
<style>
.research-hero {
    background: linear-gradient(135deg, #1d3557 0%, #457b9d 100%);
    color: white;
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 22px;
}
.research-hero h1 { color: white; margin: 0; font-weight: 600; }
.research-hero p { opacity: 0.9; margin: 4px 0 0; }

.stat-card {
    border: 1px solid #e3e8ee;
    border-radius: 10px;
    padding: 18px;
    background: #fff;
}
.stat-card .stat-num { font-size: 28px; font-weight: 700; color: #1d3557; line-height: 1; }
.stat-card .stat-lbl { color: #556; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; }

.model-pill {
    display: inline-block; padding: 3px 10px; margin: 2px;
    background: #eef2f7; border: 1px solid #d8dee8; border-radius: 14px;
    font-size: 12px; color: #334;
}
.model-pill.ok { background: #e1f5ea; border-color: #a8d8b9; color: #14532d; }
.model-pill.err { background: #fde1e1; border-color: #e8b4b4; color: #7a1a1a; }

.mode-pill {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 11.5px; font-weight: 500; background: #eef2f7; color: #1d3557;
}
.mode-rag { background: #e1f5ea; color: #14532d; }
.mode-council { background: #fef3c7; color: #78350f; }
.mode-hybrid { background: #e0e7ff; color: #3730a3; }

.source-card {
    border: 1px solid #e3e8ee; border-radius: 8px; padding: 12px 14px;
    background: #fafbfc; margin-bottom: 10px;
}
.source-card .src-head { font-weight: 600; color: #1d3557; }
.source-card .src-meta { color: #667; font-size: 12px; }
.source-card .src-text { color: #333; font-size: 13.5px; margin-top: 8px; white-space: pre-wrap; }
.source-card .src-score { float: right; font-family: monospace; color: #6b7280; font-size: 12px; }

.council-card {
    border: 1px solid #e3e8ee; border-radius: 10px; padding: 16px;
    margin-bottom: 14px; background: #fff;
}
.council-card .cm-head { font-weight: 600; color: #1d3557; margin-bottom: 8px; }
.council-card .cm-text { white-space: pre-wrap; font-size: 13.5px; color: #222; }
.council-card.err { border-left: 4px solid #dc2626; }
.council-card.ok { border-left: 4px solid #16a34a; }

.answer-block {
    background: #f7f9fc; border: 1px solid #e3e8ee; border-radius: 10px;
    padding: 18px 20px; white-space: pre-wrap; font-size: 14.5px; line-height: 1.55;
}
.answer-block code { background: #e8ecf2; padding: 1px 5px; border-radius: 4px; }
</style>
{% endblock %}
