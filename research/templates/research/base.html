{% extends 'base.html' %}

{% block title %}Forschungsassistent{% endblock %}

{% block extra_css %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rs-ink: #0f172a;
  --rs-ink-soft: #475569;
  --rs-ink-faint: #94a3b8;
  --rs-surface: #ffffff;
  --rs-surface-soft: #f8fafc;
  --rs-border: #e2e8f0;
  --rs-border-soft: #eef2f7;
  --rs-accent: #6366f1;
  --rs-accent-soft: #eef2ff;
  --rs-accent-ink: #4338ca;
  --rs-success: #059669;
  --rs-success-soft: #ecfdf5;
  --rs-warning: #d97706;
  --rs-warning-soft: #fffbeb;
  --rs-danger: #dc2626;
  --rs-danger-soft: #fef2f2;
  --rs-shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --rs-shadow-md: 0 4px 14px rgba(15, 23, 42, 0.06);
}

.research-app {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--rs-ink);
  max-width: 1320px;
  margin: 0 auto;
  padding: 32px 28px 80px;
}

.research-app h1, .research-app h2, .research-app h3 {
  font-family: 'Inter', sans-serif;
  letter-spacing: -0.02em;
}

.rs-hero {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 8px 0 28px;
  border-bottom: 1px solid var(--rs-border);
  margin-bottom: 32px;
  gap: 24px;
  flex-wrap: wrap;
}
.rs-hero__title {
  font-size: 30px;
  font-weight: 700;
  margin: 0 0 4px;
  color: var(--rs-ink);
  letter-spacing: -0.02em;
}
.rs-hero__sub {
  font-size: 15px;
  color: var(--rs-ink-soft);
  margin: 0;
  max-width: 60ch;
}
.rs-hero__actions { display: flex; gap: 8px; flex-wrap: wrap; }

.rs-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  border: 1px solid transparent;
  transition: all 0.15s ease;
  cursor: pointer;
}
.rs-btn--primary {
  background: var(--rs-ink);
  color: #fff;
  border-color: var(--rs-ink);
}
.rs-btn--primary:hover { background: #1e293b; color: #fff; }
.rs-btn--ghost {
  background: transparent;
  color: var(--rs-ink);
  border-color: var(--rs-border);
}
.rs-btn--ghost:hover { border-color: var(--rs-ink); color: var(--rs-ink); background: var(--rs-surface-soft); }
.rs-btn--accent {
  background: var(--rs-accent);
  color: #fff;
  border-color: var(--rs-accent);
}
.rs-btn--accent:hover { background: var(--rs-accent-ink); color: #fff; }

.rs-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
@media (max-width: 760px) { .rs-stats { grid-template-columns: repeat(2, 1fr); } }

.rs-stat {
  background: var(--rs-surface);
  border: 1px solid var(--rs-border);
  border-radius: 14px;
  padding: 18px 20px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.rs-stat:hover { border-color: #cbd5e1; box-shadow: var(--rs-shadow-md); }
.rs-stat__num {
  font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--rs-ink);
  font-family: 'Inter', sans-serif;
}
.rs-stat__num--mono { font-family: 'JetBrains Mono', monospace; font-size: 22px; }
.rs-stat__label {
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--rs-ink-faint); font-weight: 500;
  margin-top: 6px;
}
.rs-stat__dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 4px;
  background: var(--rs-success);
}
.rs-stat__dot--off { background: var(--rs-danger); }

.rs-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
@media (max-width: 960px) { .rs-grid { grid-template-columns: 1fr; } }

.rs-panel {
  background: var(--rs-surface);
  border: 1px solid var(--rs-border);
  border-radius: 14px;
  overflow: hidden;
}
.rs-panel__head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--rs-border-soft);
  display: flex; justify-content: space-between; align-items: center;
}
.rs-panel__title {
  font-size: 14px; font-weight: 600; color: var(--rs-ink);
  display: flex; align-items: center; gap: 8px;
}
.rs-panel__title i { color: var(--rs-ink-soft); }
.rs-panel__body { padding: 8px 20px 20px; }
.rs-panel__link {
  font-size: 13px; color: var(--rs-accent); text-decoration: none;
}
.rs-panel__link:hover { color: var(--rs-accent-ink); }

.rs-query-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--rs-border-soft);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
}
.rs-query-item:last-child { border-bottom: none; }
.rs-query-item__text { flex: 1; min-width: 0; }
.rs-query-item__q {
  font-size: 14.5px; font-weight: 500; color: var(--rs-ink);
  text-decoration: none;
  display: block; margin-bottom: 4px;
}
.rs-query-item__q:hover { color: var(--rs-accent-ink); }
.rs-query-item__meta {
  font-size: 12.5px; color: var(--rs-ink-faint);
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
}

.rs-pill {
  display: inline-flex; align-items: center;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11.5px; font-weight: 500;
  background: var(--rs-surface-soft);
  color: var(--rs-ink-soft);
  border: 1px solid var(--rs-border);
  font-family: 'JetBrains Mono', monospace;
}
.rs-pill--mode-rag { background: var(--rs-success-soft); color: var(--rs-success); border-color: transparent; }
.rs-pill--mode-council { background: var(--rs-warning-soft); color: var(--rs-warning); border-color: transparent; }
.rs-pill--mode-hybrid { background: var(--rs-accent-soft); color: var(--rs-accent-ink); border-color: transparent; }
.rs-pill--ok { background: var(--rs-success-soft); color: var(--rs-success); border-color: transparent; }
.rs-pill--err { background: var(--rs-danger-soft); color: var(--rs-danger); border-color: transparent; }

.rs-model-list { display: flex; flex-direction: column; gap: 6px; }
.rs-model-row {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--rs-ink-soft);
}
.rs-model-row__name { font-weight: 500; color: var(--rs-ink); min-width: 150px; }
.rs-model-row__id {
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  color: var(--rs-ink-faint);
}

/* Ask-Form */
.rs-form { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
@media (max-width: 960px) { .rs-form { grid-template-columns: 1fr; } }

.rs-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--rs-border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 14.5px;
  color: var(--rs-ink);
  background: var(--rs-surface);
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.rs-input:focus {
  outline: none;
  border-color: var(--rs-accent);
  box-shadow: 0 0 0 3px var(--rs-accent-soft);
}
.rs-textarea { min-height: 110px; resize: vertical; line-height: 1.5; }

.rs-label {
  display: block;
  font-size: 13px; font-weight: 600;
  color: var(--rs-ink); margin-bottom: 8px;
  letter-spacing: -0.01em;
}
.rs-hint { font-size: 12.5px; color: var(--rs-ink-faint); margin-top: 6px; }

.rs-radio-group, .rs-check-group { display: flex; flex-direction: column; gap: 6px; }
.rs-radio-label, .rs-check-label {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--rs-border);
  border-radius: 10px;
  cursor: pointer;
  font-size: 13.5px;
  color: var(--rs-ink);
  transition: all 0.15s ease;
}
.rs-radio-label:hover, .rs-check-label:hover {
  border-color: var(--rs-accent);
  background: var(--rs-accent-soft);
}
.rs-radio-label input, .rs-check-label input { margin-top: 2px; accent-color: var(--rs-accent); }

/* Detail */
.rs-meta-bar {
  display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
  font-size: 13px; color: var(--rs-ink-soft);
  margin-bottom: 24px;
}

.rs-question-card {
  background: var(--rs-surface-soft);
  border-left: 3px solid var(--rs-accent);
  border-radius: 6px;
  padding: 18px 22px;
  margin-bottom: 24px;
  font-size: 15.5px;
  color: var(--rs-ink);
  line-height: 1.5;
}

.rs-answer {
  background: var(--rs-surface);
  border: 1px solid var(--rs-border);
  border-radius: 14px;
  padding: 28px 32px;
  margin-bottom: 24px;
  font-size: 15px;
  line-height: 1.7;
  color: var(--rs-ink);
  font-family: 'Inter', sans-serif;
  white-space: pre-wrap;
}
.rs-answer h1, .rs-answer h2, .rs-answer h3 {
  font-weight: 600; margin: 1.2em 0 0.4em;
}
.rs-answer code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--rs-surface-soft); padding: 1px 6px; border-radius: 4px; font-size: 0.9em;
}

.rs-sources {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 14px;
}
.rs-source {
  background: var(--rs-surface);
  border: 1px solid var(--rs-border);
  border-radius: 12px;
  padding: 16px 18px;
  font-size: 13.5px;
  transition: all 0.15s ease;
}
.rs-source:hover { border-color: #cbd5e1; box-shadow: var(--rs-shadow-md); }
.rs-source__head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
}
.rs-source__idx {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600; color: var(--rs-accent-ink);
  background: var(--rs-accent-soft);
  padding: 2px 8px; border-radius: 6px;
  font-size: 12px;
}
.rs-source__score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px; color: var(--rs-ink-faint);
}
.rs-source__title {
  font-weight: 600; color: var(--rs-ink); font-size: 14px;
  margin-bottom: 2px; line-height: 1.3;
}
.rs-source__meta {
  font-size: 12px; color: var(--rs-ink-faint); margin-bottom: 10px;
}
.rs-source__text {
  font-size: 12.5px; color: var(--rs-ink-soft); line-height: 1.5;
  background: var(--rs-surface-soft);
  padding: 10px 12px; border-radius: 8px;
  white-space: pre-wrap;
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.rs-source__link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--rs-accent); text-decoration: none;
  margin-top: 8px;
}
.rs-source__link:hover { color: var(--rs-accent-ink); }

.rs-council {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
  gap: 14px;
}
.rs-council-card {
  background: var(--rs-surface);
  border: 1px solid var(--rs-border);
  border-left: 3px solid var(--rs-border);
  border-radius: 12px;
  padding: 18px 20px;
}
.rs-council-card--ok { border-left-color: var(--rs-success); }
.rs-council-card--err { border-left-color: var(--rs-danger); opacity: 0.85; }
.rs-council-card__head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.rs-council-card__name { font-weight: 600; color: var(--rs-ink); font-size: 14px; }
.rs-council-card__time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px; color: var(--rs-ink-faint);
}
.rs-council-card__text {
  font-size: 13.5px; color: var(--rs-ink-soft);
  line-height: 1.55; white-space: pre-wrap;
  max-height: 600px; overflow-y: auto;
}

.rs-empty {
  text-align: center; padding: 40px 20px;
  color: var(--rs-ink-faint); font-size: 14px;
}
.rs-empty a { color: var(--rs-accent); text-decoration: none; }

.rs-alert {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 16px;
  border: 1px solid;
}
.rs-alert--error {
  background: var(--rs-danger-soft);
  color: var(--rs-danger);
  border-color: #fecaca;
}

.rs-pager {
  display: flex; justify-content: center; align-items: center; gap: 8px;
  margin-top: 20px; font-size: 13px;
}
.rs-pager a {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--rs-border);
  color: var(--rs-ink); text-decoration: none;
}
.rs-pager a:hover { border-color: var(--rs-ink); }
.rs-pager__current {
  padding: 6px 12px; border-radius: 6px; background: var(--rs-ink); color: #fff;
  font-family: 'JetBrains Mono', monospace;
}

.rs-section-title {
  font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--rs-ink-faint); font-weight: 600;
  margin: 28px 0 14px;
  display: flex; align-items: center; gap: 8px;
}
.rs-section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--rs-border);
}
</style>
{% endblock %}

{% block content %}
<div class="research-app">
{% block research_content %}{% endblock %}
</div>
{% endblock %}
