{% extends 'base.html' %}
{% load static %}

{% block title %}Neues Video Projekt{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-plus-circle"></i> Neues Projekt</h1>
        <a href="{% url 'video:project_list' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Zurück
        </a>
    </div>

    <form method="post" enctype="multipart/form-data" id="projectForm">
        {% csrf_token %}

        <!-- Projektname -->
        <div class="card mb-4">
            <div class="card-header"><h5 class="mb-0"><i class="bi bi-tag"></i> Projektname</h5></div>
            <div class="card-body">
                <input type="text" name="name" class="form-control form-control-lg" placeholder="z.B. Produktvideo Sommerkampagne" required>
            </div>
        </div>

        <!-- Charaktere (max 3) -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-people"></i> Charaktere <small class="text-muted">(max. 3, optional)</small></h5>
            </div>
            <div class="card-body" id="charactersContainer">
                <div class="row character-row mb-3" data-index="1">
                    <div class="col-md-5">
                        <input type="text" name="character_1_name" class="form-control" placeholder="Charaktername">
                    </div>
                    <div class="col-md-5">
                        <input type="file" name="character_1" class="form-control" accept="image/*">
                    </div>
                    <div class="col-md-2 d-flex align-items-center">
                        <span class="badge bg-primary">1</span>
                    </div>
                </div>
                <div class="row character-row mb-3" data-index="2">
                    <div class="col-md-5">
                        <input type="text" name="character_2_name" class="form-control" placeholder="Charaktername">
                    </div>
                    <div class="col-md-5">
                        <input type="file" name="character_2" class="form-control" accept="image/*">
                    </div>
                    <div class="col-md-2 d-flex align-items-center">
                        <span class="badge bg-secondary">2</span>
                    </div>
                </div>
                <div class="row character-row mb-3" data-index="3">
                    <div class="col-md-5">
                        <input type="text" name="character_3_name" class="form-control" placeholder="Charaktername">
                    </div>
                    <div class="col-md-5">
                        <input type="file" name="character_3" class="form-control" accept="image/*">
                    </div>
                    <div class="col-md-2 d-flex align-items-center">
                        <span class="badge bg-secondary">3</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Produkt (optional) -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-box"></i> Produkt <small class="text-muted">(optional)</small></h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-5">
                        <input type="text" name="product_name" class="form-control" placeholder="Produktname">
                    </div>
                    <div class="col-md-5">
                        <input type="file" name="product" class="form-control" accept="image/*">
                    </div>
                </div>
            </div>
        </div>

        <!-- Stillbild (optional) -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-image"></i> Stillbild / Referenz <small class="text-muted">(optional)</small></h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-5">
                        <input type="text" name="still_name" class="form-control" placeholder="z.B. Hintergrund, Logo">
                    </div>
                    <div class="col-md-5">
                        <input type="file" name="still_image" class="form-control" accept="image/*">
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-check-circle"></i> Projekt erstellen
        </button>
    </form>
</div>
{% endblock %}
