{% extends 'library/base.html' %}

{% block content %}
<div class="container py-4" style="max-width: 600px;">
  <h2>{{ title }}</h2>
  <form method="post" class="card card-body mt-3">
    {% csrf_token %}
    <div class="mb-3">{{ form.name.label_tag }}{{ form.name }}</div>
    <div class="mb-3">{{ form.description.label_tag }}{{ form.description }}</div>
    <div class="mb-3">{{ form.color.label_tag }}{{ form.color }}</div>
    <button class="btn btn-primary">Speichern</button>
    <a href="{% url 'library:collection_list' %}" class="btn btn-outline-secondary">Abbrechen</a>
  </form>
</div>
{% endblock %}
