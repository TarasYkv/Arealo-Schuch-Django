{% extends 'base.html' %}

{% block title %}Literatur & Referenzen{% endblock %}

{% block extra_css %}
<style>
.lib-hero {
    background: linear-gradient(135deg, #0b3d60 0%, #4a90c2 100%);
    color: white;
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 22px;
}
.lib-hero h1 { color: white; margin: 0; font-weight: 600; }
.lib-hero p { opacity: 0.9; margin: 4px 0 0; }

.stat-card {
    border: 1px solid #e3e8ee;
    border-radius: 10px;
    padding: 18px;
    background: #fff;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.stat-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(11,61,96,0.08);
}
.stat-card .stat-num { font-size: 32px; font-weight: 700; color: #0b3d60; line-height: 1; }
.stat-card .stat-lbl { color: #556; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; }

.ref-row {
    border-bottom: 1px solid #eef1f5;
    padding: 10px 0;
}
.ref-row .ref-key { font-family: 'JetBrains Mono', monospace; color: #0b3d60; font-weight: 600; font-size: 12px; }
.ref-row .ref-title { font-weight: 500; color: #222; }
.ref-row .ref-meta { color: #668; font-size: 12.5px; }

.status-pill {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11.5px; font-weight: 500;
}
.status-unread  { background: #f5f5f5; color: #666; }
.status-reading { background: #fff3cd; color: #856404; }
.status-read    { background: #d4edda; color: #155724; }
.status-cited   { background: #cce5ff; color: #004085; }

.collection-card {
    border-radius: 10px; padding: 14px 16px; background: #fff;
    border: 1px solid #e3e8ee;
}
.collection-card h5 { margin: 0; font-weight: 600; }
.collection-card .count { color: #668; font-size: 13px; }
</style>
{% endblock %}
